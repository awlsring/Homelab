    spec:
      automountServiceAccountToken: false
      containers:
        - env:
            - name: IMMICH_METRICS
              value: "true"
            - name: UPLOAD_LOCATION
              value: ./library
            - name: DB_HOSTNAME
              value: immich-db-c85d4e5a-rw
