      destinationPath: s3://awlsring-homelab-cnpg-db-backups/immich-db
      endpointURL: https://s3.us-east-005.backblazeb2.com
      s3Credentials:
        accessKeyId:
          key: password
          name: immich-backup-store-access-key-c87d982f
