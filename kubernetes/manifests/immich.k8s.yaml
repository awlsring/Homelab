              value: immich
            - name: DB_DATABASE_NAME
              value: immich
            - name: DB_PORT
              value: "5432"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: immich-database-secret-c86932a0
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: immich-database-secret-c86932a0
            - name: IMMICH_MACHINE_LEARNING_URL
              value: http://immich-app-machine-learning-service-c858f540:3003
            - name: PUBLIC_IMMICH_SERVER_URL
              value: immich.us-drig-1.drigs.org
            - name: REDIS_HOSTNAME
              value: immich-redis-service-c83c7595
            - name: MACHINE_LEARNING_EAGER_STARTUP
              value: "false"
            - name: IMMICH_CONFIG_FILE
              value: /immich-config.json
          image: ghcr.io/immich-app/immich-server:v2.6.1
          imagePullPolicy: Always
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/server/ping
              port: 2283
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
          name: immich-server
          ports:
            - containerPort: 2283
              name: http
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /api/server/ping
              port: 2283
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 8000m
              memory: 16384Mi
            requests:
              cpu: 200m
              memory: 1024Mi
          securityContext:
            allowPrivilegeEscalation: true
            privileged: true
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /api/server/ping
              port: 2283
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /usr/src/app/upload
              name: media
            - mountPath: photos
              name: photos
            - mountPath: /immich-config.json
              name: configmap-immich-app-server-config-c86126e4
              readOnly: true
              subPath: immich-config.json
      dnsPolicy: ClusterFirst
      hostNetwork: false
      restartPolicy: Always
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: true
      setHostnameAsFQDN: false
      terminationGracePeriodSeconds: 30
      volumes:
        - name: media
          nfs:
            path: /mnt/WD-6D-8T/immich-uploads
            server: 10.0.10.180
        - name: photos
          nfs:
            path: /mnt/WD-6D-8T/photos
            server: 10.0.10.180
        - configMap:
            name: immich-app-server-config-c86126e4
          name: configmap-immich-app-server-config-c86126e4
