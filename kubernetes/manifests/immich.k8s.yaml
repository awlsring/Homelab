        compression: gzip
    retentionPolicy: 14d
  bootstrap:
    initdb:
      database: immich
      owner: immich
      secret:
        name: immich-database-secret-c86932a0
  externalClusters: []
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16-0.4.3
  instances: 3
  monitoring: {}
  postgresql:
    shared_preload_libraries:
      - vchord.so
  primaryUpdateStrategy: unsupervised
  storage:
    size: 10Gi
    storageClass: local-path
